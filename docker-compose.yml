version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: capbon2028_db
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-capbon_db}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${DB_USER:-capbon_admin}
      MYSQL_PASSWORD: ${DB_PASS:-capbon_password}
    ports:
      - "3307:3306"
    volumes:
      - capbon2028_mysql_data:/var/lib/mysql
    networks:
      - capbon2028_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: capbon2028_backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DB_HOST=db
      - DB_USER=${DB_USER:-capbon_admin}
      - DB_PASS=${DB_PASS:-capbon_password}
      - DB_NAME=${DB_NAME:-capbon_db}
      - JWT_SECRET=${JWT_SECRET}
    ports:
      - "5001:5000"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - capbon2028_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: capbon2028_frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - capbon2028_network

networks:
  capbon2028_network:
    driver: bridge

volumes:
  capbon2028_mysql_data:
